name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qe-group-draw-production-deploy
  cancel-in-progress: false

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Restore Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', '.bun-version') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check:ci

      - name: Build production bundle
        run: bun run build:all

      - name: Prepare release bundle
        run: |
          set -euo pipefail
          mkdir -p release/static
          mkdir -p release/live
          rsync -a \
            dist/ \
            release/static/
          rsync -a \
            dist/ \
            release/live/dist/
          rsync -a \
            server-dist/ \
            release/live/server-dist/
          rsync -a \
            deploy/ \
            release/live/deploy/
          cp .bun-version release/live/.bun-version

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ github.sha }}
          path: release
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  deploy_static:
    if: github.ref == 'refs/heads/main'
    needs: bundle
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://jannis.rocks/groupdraw

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: release-${{ github.sha }}
          path: release

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${SSH_PRIVATE_KEY:?Missing SSH_PRIVATE_KEY secret}"
          : "${KNOWN_HOSTS:?Missing KNOWN_HOSTS secret}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync site to server
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${DEPLOY_USER:?Missing DEPLOY_USER variable}"

          deploy_host="jannis.rocks"
          deploy_path="/var/www/jannis.rocks/public_html/groupdraw"
          ssh_opts="-i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"

          ssh $ssh_opts "${DEPLOY_USER}@${deploy_host}" "mkdir -p '${deploy_path}'"

          rsync -az --delete \
            -e "ssh $ssh_opts" \
            release/static/ \
            "${DEPLOY_USER}@${deploy_host}:${deploy_path}/"

      - name: Remove SSH config
        if: always()
        run: rm -rf ~/.ssh

  deploy_live:
    if: github.ref == 'refs/heads/main'
    needs: bundle
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://groupdraw.quadball.eu

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: release-${{ github.sha }}
          path: release

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${SSH_PRIVATE_KEY:?Missing SSH_PRIVATE_KEY secret}"
          : "${KNOWN_HOSTS:?Missing KNOWN_HOSTS secret}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync live release to server
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          LIVE_DEPLOY_BASE: ${{ vars.LIVE_DEPLOY_BASE }}
          LIVE_DEPLOY_USER: ${{ vars.LIVE_DEPLOY_USER }}
        run: |
          set -euo pipefail

          deploy_host="jannis.rocks"
          live_base="${LIVE_DEPLOY_BASE:-/srv/qe-group-draw-live}"
          live_user="${LIVE_DEPLOY_USER:-${DEPLOY_USER:?Missing DEPLOY_USER variable}}"
          release_id="${GITHUB_SHA}"
          remote_release_dir="${live_base}/releases/${release_id}"
          ssh_opts="-i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"

          ssh $ssh_opts "${live_user}@${deploy_host}" "mkdir -p '${remote_release_dir}'"

          rsync -az --delete \
            -e "ssh $ssh_opts" \
            release/live/ \
            "${live_user}@${deploy_host}:${remote_release_dir}/"

      - name: Activate live release
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          LIVE_DEPLOY_BASE: ${{ vars.LIVE_DEPLOY_BASE }}
          LIVE_DEPLOY_USER: ${{ vars.LIVE_DEPLOY_USER }}
          LIVE_SERVICE_NAME: ${{ vars.LIVE_SERVICE_NAME }}
          LIVE_SERVICE_PORT: ${{ vars.LIVE_SERVICE_PORT }}
        run: |
          set -euo pipefail

          deploy_host="jannis.rocks"
          live_base="${LIVE_DEPLOY_BASE:-/srv/qe-group-draw-live}"
          live_user="${LIVE_DEPLOY_USER:-${DEPLOY_USER:?Missing DEPLOY_USER variable}}"
          service_name="${LIVE_SERVICE_NAME:-qe-group-draw-live}"
          service_port="${LIVE_SERVICE_PORT:-3010}"
          release_id="${GITHUB_SHA}"
          remote_release_dir="${live_base}/releases/${release_id}"
          ssh_opts="-i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"

          ssh $ssh_opts "${live_user}@${deploy_host}" "\
            chmod +x '${remote_release_dir}/deploy/activate-live-release.sh' && \
            '${remote_release_dir}/deploy/activate-live-release.sh' \
              --base-dir '${live_base}' \
              --release '${release_id}' \
              --service '${service_name}' \
              --port '${service_port}'"

      - name: Remove SSH config
        if: always()
        run: rm -rf ~/.ssh
